name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
    types: [checks_requested]

jobs:
  test:
    runs-on: sylphx-linux-standard
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect runtime changes
        id: changes
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
          elif [ "${{ github.event_name }}" = "merge_group" ]; then
            base="$(git merge-base HEAD origin/main)"
          else
            base="HEAD^"
          fi

          git diff --name-only "$base" HEAD | tee /tmp/changed-files
          if grep -Ev '^(\.doctrine/|\.github/|AGENTS\.md$|PROJECT\.md$|README\.md$|docs/)' /tmp/changed-files | grep -q .; then
            echo "runtime=true" >> "$GITHUB_OUTPUT"
          else
            echo "runtime=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip runtime checks for project-control-only changes
        if: steps.changes.outputs.runtime != 'true'
        run: echo "No runtime-affecting package changes detected; central project-control and runner audits cover this change."

      - name: Setup Bun
        if: steps.changes.outputs.runtime == 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        if: steps.changes.outputs.runtime == 'true'
        run: bun install

      - name: Check code quality
        if: steps.changes.outputs.runtime == 'true'
        run: bun run check

      - name: Run tests
        if: steps.changes.outputs.runtime == 'true'
        run: bun test

      - name: Build
        if: steps.changes.outputs.runtime == 'true'
        run: bun run build
